<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>A7X Player - Bersih & Berjarak</title>
    
    <!-- LINK WAJIB UNTUK PROGRESSIVE WEB APP (PWA) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#16181f">
    
    <!-- Google Fonts & Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

    <style>
        :root {
            --bg-color: #0f1014; 
            --card-bg: #16181f; 
            --inner-box-bg: #1e2028; 
            --active-track-bg: #2b303d; 
            --text-main: #e2e2e9;
            --text-muted: #8e919a;
            --accent-blue: #a8c7fa; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow: hidden; 
        }

        /* CONTAINER UTAMA PANEL KONTROL (Kunci di Paling Bawah Layar) */
        .mobile-player-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--card-bg);
            padding: 16px 16px 24px 16px; 
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.7);
            z-index: 100;
            max-width: 420px; 
            margin: 0 auto;
        }

        /* PANEL KONTROL KECIL & RAMPING */
        .control-panel-box {
            background-color: var(--inner-box-bg);
            border-radius: 16px;
            padding: 12px; 
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* POP-UP PLAYLIST - BERJARAK AMAN DI ATAS PANEL TOMBOL */
        .playlist-popup {
            position: fixed;
            /* Jarak 70px dari atas agar terhindar dari Bar URL Chrome/Brave */
            top: calc(70px + env(safe-area-inset-top)); 
            /* Jeda gap kosong agar tidak menempel dengan pemutar musik */
            bottom: 160px; 
            left: 16px;
            right: 16px;
            max-width: 388px; 
            margin: 0 auto;
            
            background-color: var(--inner-box-bg);
            border-radius: 20px;
            padding: 16px 8px 12px 8px; 
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            z-index: 90;
            
            /* Animasi Lembut */
            opacity: 0;
            transform: scale(0.98) translateY(10px);
            pointer-events: none;
            transition: transform 0.2s ease-out, opacity 0.2s ease;
        }

        /* Ketika Playlist Terbuka */
        .playlist-popup.show {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        .playlist-popup::-webkit-scrollbar {
            width: 4px;
        }
        .playlist-popup::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Desain Baris Item Lagu */
        .track-item {
            display: flex;
            align-items: center;
            padding: 12px 14px; 
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            color: var(--text-muted);
            transition: background-color 0.15s ease;
            margin-bottom: 4px;
        }

        .track-item:active {
            background-color: rgba(255, 255, 255, 0.06);
        }

        .track-item.active {
            background-color: var(--active-track-bg);
            color: var(--accent-blue);
            font-weight: 500;
        }

        .track-index {
            width: 32px;
            font-size: 0.85rem;
            font-weight: bold;
            opacity: 0.6;
        }

        .track-name-text {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Teks Judul Lagu Aktif di Kotak Bawah */
        .current-song-title {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-main);
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 4px;
        }

        .buttons-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px; 
        }

        .md-btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .md-btn .material-symbols-rounded {
            font-size: 1.8rem;
        }

        .md-btn-main {
            background-color: rgba(255, 255, 255, 0.06);
            width: 52px;
            height: 52px;
        }
        .md-btn-main .material-symbols-rounded {
            font-size: 2.2rem;
        }

        #youtube-player {
            display: none;
        }
    </style>
</head>
<body>

<!-- Playlist Popup -->
<div class="playlist-popup" id="playlist-popup-box"></div>

<!-- Kotak Pemutar Fixed Bottom -->
<div class="mobile-player-fixed">
    <div id="youtube-player"></div>

    <div class="control-panel-box">
        <div class="current-song-title" id="current-track-name">Menghubungkan...</div>
        
        <div class="buttons-row">
            <button class="md-btn" onclick="prevMusic()" title="Sebelumnya">
                <span class="material-symbols-rounded">skip_previous</span>
            </button>
            
            <button class="md-btn md-btn-main" onclick="handlePlayAndPopup()" id="play-btn" title="Putar">
                <span class="material-symbols-rounded" id="play-icon">play_arrow</span>
            </button>
            
            <button class="md-btn" onclick="nextMusic()" title="Berikutnya">
                <span class="material-symbols-rounded">skip_next</span>
            </button>
        </div>
    </div>
</div>

<script>
    const playlistId = 'PLgF5KLwzxU-17Fjn6-viXiHGnlrDgMixu';

    const mySongs = [
        "Nightmare", "Afterlife", "A Little Piece of Heaven", "Bat Country",
        "Beast and the Harlot", "So Far Away", "Critical Acclaim", "Almost Easy",
        "Save Me", "Seize the Day", "Second Heartbeat", "Unholy Confessions",
        "Buried Alive", "Hail to the King", "Chapter Four", "Welcome to the Family",
        "Dear God", "M.I.A.", "I Won't See You Tonight Part 1", "I Won't See You Tonight Part 2",
        "Scream", "Coming Home", "Strength of the World", "The Stage",
        "Fiction", "Not Ready to Die (From \"Call of the Dead\")", "Gunslinger", "Lost",
        "Exist", "Carry On", "Burn It Down", "Shepherd of Fire"
    ];

    let player;
    let isPlaying = false;
    let qualityEnforcerInterval;

    const playlistPopupBox = document.getElementById('playlist-popup-box');
    mySongs.forEach((songTitle, index) => {
        const div = document.createElement('div');
        div.className = `track-item ${index === 0 ? 'active' : ''}`;
        div.id = `track-${index}`;
        div.onclick = () => {
            playSpecificTrack(index);
        };
        div.innerHTML = `
            <span class="track-index">${index + 1}</span>
            <span class="track-name-text">${songTitle}</span>
        `;
        playlistPopupBox.appendChild(div);
    });

    function handlePlayAndPopup() {
        const popup = document.getElementById('playlist-popup-box');
        if (isPlaying) {
            player.pauseVideo();
            popup.classList.remove('show'); 
        } else {
            player.playVideo();
            popup.classList.add('show'); 
        }
    }

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            height: '0',
            width: '0',
            playerVars: {
                listType: 'playlist',
                list: playlistId,
                loop: 1,
                controls: 0,
                disablekb: 1,
                fs: 0,
                rel: 0,
                showinfo: 0,
                iv_load_policy: 3
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function forceLowestQuality() {
        if (player && typeof player.setPlaybackQuality === 'function') {
            player.setPlaybackQuality('tiny'); 
            player.setPlaybackQuality('small'); 
        }
    }

    function onPlayerReady(event) {
        forceLowestQuality();
        document.getElementById('current-track-name').innerText = mySongs[0];
        
        clearInterval(qualityEnforcerInterval);
        qualityEnforcerInterval = setInterval(forceLowestQuality, 2000);
    }

    function onPlayerStateChange(event) {
        if (player && typeof player.getPlaylistIndex === 'function') {
            const currentIndex = player.getPlaylistIndex();
            if (currentIndex !== -1 && mySongs[currentIndex]) {
                document.getElementById('current-track-name').innerText = mySongs[currentIndex];
                updateTrackUI(currentIndex);
            }
        }

        const playIcon = document.getElementById('play-icon');
        if (event.data == YT.PlayerState.PLAYING) {
            isPlaying = true;
            playIcon.innerText = "pause";
            forceLowestQuality(); 
        } else {
            if (event.data != YT.PlayerState.BUFFERING) {
                isPlaying = false;
                playIcon.innerText = "play_arrow";
            }
        }
    }

    function updateTrackUI(index) {
        if(index === -1 || index === undefined) return;
        document.querySelectorAll('.track-item').forEach(el => el.classList.remove('active'));
        const activeEl = document.getElementById(`track-${index}`);
        if(activeEl) {
            activeEl.classList.add('active');
            activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }

    function nextMusic() {
        player.nextVideo();
        setTimeout(forceLowestQuality, 500);
    }

    function prevMusic() {
        player.previousVideo();
        setTimeout(forceLowestQuality, 500);
    }

    function playSpecificTrack(index) {
        if (player && typeof player.playVideoAt === 'function') {
            player.playVideoAt(index);
            updateTrackUI(index);
            setTimeout(forceLowestQuality, 500);
        }
    }

    // REGISTRASI SERVICE WORKER UNTUK TOMBOL "INSTALL" RESMI DI BRAVE
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker Terdaftar!', reg))
                .catch(err => console.log('Gagal Daftar SW', err));
        });
    }

    // Mencegah default prompt untuk memicu opsi "Instal Aplikasi" di menu browser
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
    });
</script>

</body>
</html>
